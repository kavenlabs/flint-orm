library:
  name: 'flint-orm'
  version: '0.7.0'
  repository: 'https://github.com/kavenlabs/flint-orm'
  description: 'A type-safe, driver-agnostic SQLite ORM for JavaScript'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'client setup and driver selection'
    slug: 'setup'
    description: 'Connecting to a database with the right driver for the environment'

  - name: 'schema definition'
    slug: 'schema'
    description: 'Defining tables, columns, indexes, constraints, and foreign keys'

  - name: 'querying data'
    slug: 'queries'
    description: 'Reading, writing, and modifying data with type-safe queries'

  - name: 'schema evolution'
    slug: 'migrations'
    description: 'Generating and applying schema migrations safely'

skills:
  - name: 'setup-client'
    slug: 'setup-client'
    domain: 'setup'
    description: 'Install flint-orm, choose a driver, and connect to a database'
    type: 'core'
    covers:
      - 'flint() factory'
      - 'driver entry points'
      - 'flint.config.ts'
      - 'database URL configuration'
    tasks:
      - 'Install flint-orm and a driver package'
      - 'Create flint.config.ts with driver and database settings'
      - 'Initialize the database client with flint()'
      - 'Choose between local file, in-memory, or remote database'
    failure_modes:
      - mistake: 'Using libsql-web for local file databases'
        mechanism: 'libsql-web only supports ws:, wss:, http:, https: URLs — file: URLs require the regular libsql driver'
        wrong_pattern: |
          import { flint } from 'flint-orm/libsql-web';
          const db = flint({ url: './app.db' }); // ERROR: file: not supported
        correct_pattern: |
          import { flint } from 'flint-orm/libsql';
          const db = flint({ url: './app.db' });
        source: 'src/entries/libsql-web.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Driver in flint.config.ts does not match the db initialization driver'
        mechanism: 'The CLI uses flint.config.ts to determine which driver to use for migrations, but the app uses whichever driver you import — these must match'
        wrong_pattern: |
          // flint.config.ts
          export default defineConfig({ driver: 'bun-sqlite', ... });

          // app.ts
          import { flint } from 'flint-orm/libsql'; // MISMATCH
          const db = flint({ url: '...' });
        correct_pattern: |
          // flint.config.ts
          export default defineConfig({ driver: 'libsql', ... });

          // app.ts
          import { flint } from 'flint-orm/libsql'; // MATCHES
          const db = flint({ url: '...' });
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

    compositions:
      - library: '@libsql/client'
        skill: 'driver-selection'
      - library: 'better-sqlite3'
        skill: 'driver-selection'

  - name: 'driver-selection'
    slug: 'driver-selection'
    domain: 'setup'
    description: 'Choose the right driver for your environment: local file, in-memory, serverless, or remote'
    type: 'core'
    covers:
      - 'bun:sqlite'
      - 'better-sqlite3'
      - '@libsql/client'
      - '@libsql/client/web'
      - '@tursodatabase/database'
      - '@tursodatabase/sync'
    tasks:
      - 'Choose between local file (bun:sqlite, better-sqlite3, libsql) and remote (libsql, turso)'
      - 'Choose serverless-friendly driver (libsql-web) for edge/serverless environments'
      - 'Understand sync vs async drivers'
      - 'Configure authToken for remote databases'
    subsystems:
      - name: 'local file drivers'
        package: 'bun:sqlite, better-sqlite3'
        config_surface: 'url: file path'
      - name: 'remote/file drivers'
        package: '@libsql/client'
        config_surface: 'url: libsql://, file:, http://, authToken'
      - name: 'serverless drivers'
        package: '@libsql/client/web'
        config_surface: 'url: ws://, wss://, http://, https:// (no file: support)'
      - name: 'turso drivers'
        package: '@tursodatabase/database, @tursodatabase/sync'
        config_surface: 'url: turso URL, authToken'
    failure_modes:
      - mistake: 'Using libsql-web with file: URLs'
        mechanism: 'libsql-web only supports HTTP/WebSocket URLs — it has no native binary and cannot access local files'
        wrong_pattern: |
          import { flint } from 'flint-orm/libsql-web';
          const db = flint({ url: 'file:./app.db' }); // ERROR
        correct_pattern: |
          // For local files, use libsql or bun-sqlite
          import { flint } from 'flint-orm/libsql';
          const db = flint({ url: 'file:./app.db' });
        source: 'src/entries/libsql-web.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Not providing authToken for remote databases'
        mechanism: 'Remote Turso/libsql databases require authentication'
        wrong_pattern: |
          import { flint } from 'flint-orm/libsql';
          const db = flint({ url: 'libsql://my-db.turso.io' }); // Missing authToken
        correct_pattern: |
          import { flint } from 'flint-orm/libsql';
          const db = flint({
            url: 'libsql://my-db.turso.io',
            authToken: process.env.TURSO_AUTH_TOKEN,
          });
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

  - name: 'define-schema'
    slug: 'define-schema'
    domain: 'schema'
    description: 'Create tables with columns, indexes, constraints, and foreign keys'
    type: 'core'
    covers:
      - 'table()'
      - 'snakeCase.table()'
      - 'Column constructors (text, integer, boolean, json, real, date)'
      - 'Column modifiers (primaryKey, notNull, unique, default, references, onDelete, onUpdate, autoIncrement, defaultNow, onUpdateTimestamp)'
      - 'Index builder'
      - 'InferRow and InsertRow types'
    tasks:
      - 'Define a table with typed columns'
      - 'Use snakeCase.table() for automatic snake_case column names'
      - 'Add primary keys, unique constraints, and NOT NULL'
      - 'Set default values and dynamic defaults'
      - 'Define foreign keys with ON DELETE/UPDATE actions'
      - 'Create indexes for query performance'
      - 'Derive TypeScript row types from table definitions'
    failure_modes:
      - mistake: 'Using table() with camelCase keys without snakeCase variant'
        mechanism: 'table() uses the object key as the SQL column name — camelCase keys produce camelCase SQL columns'
        wrong_pattern: |
          const users = table('users', {
            id: text('id').primaryKey(),
            firstName: text('firstName'), // SQL: firstName, not first_name
          });
        correct_pattern: |
          import * as d from 'flint-orm/table';
          const users = d.snakeCase.table('users', {
            id: d.integer().autoIncrement().primaryKey(),
            firstName: d.text().notNull(), // SQL: first_name
          });
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Calling .references() on a column before table() stamps it'
        mechanism: 'TypeScript prevents this — .references() requires a ColumnDef with tableName set'
        wrong_pattern: |
          const col = text('userId').references(users.id); // ERROR: users not yet defined
        correct_pattern: |
          const users = table('users', { id: text('id').primaryKey() });
          const posts = table('posts', {
            userId: text('userId').references(users.id),
          });
        source: 'src/schema/columns.ts'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Using .__internal in application code'
        mechanism: '.__internal is for ORM internals — its shape can change between versions'
        wrong_pattern: |
          const typeName = users.name.__internal._type; // DON'T DO THIS
        correct_pattern: |
          type User = InferRow<typeof users>;
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

    reference_candidates:
      - topic: 'column modifiers'
        reason: '>10 distinct modifiers with type-specific behaviors (autoIncrement for integer, defaultNow for date)'
    subsystems:
      - name: 'column constructors'
        package: 'flint-orm/table'
        config_surface: 'text, integer, boolean, json, real, date'
      - name: 'column modifiers'
        package: 'flint-orm/table'
        config_surface: 'primaryKey, notNull, unique, default, defaultFn, references, onDelete, onUpdate, autoIncrement, defaultNow, onUpdateTimestamp'

  - name: 'write-queries'
    slug: 'write-queries'
    domain: 'queries'
    description: 'Read, write, and modify data with type-safe SELECT, INSERT, UPDATE, DELETE, joins, and aggregates'
    type: 'core'
    covers:
      - 'selectFrom() with where, columns, single, orderBy, limit, offset, distinct'
      - 'insert() with values, returning, onConflictDoNothing, onConflictDoUpdate'
      - 'update() with set, where, returning'
      - 'delete() with where, returning'
      - 'leftJoin() and innerJoin() with auto-join and explicit conditions'
      - 'Aggregate functions (count, sum, avg, min, max)'
      - 'Raw SQL with sql template tag and $run'
    tasks:
      - 'Query rows with SELECT and conditions'
      - 'Narrow result columns with .columns()'
      - 'Get a single row with .single()'
      - 'Insert single or multiple rows'
      - 'Upsert with onConflictDoUpdate'
      - 'Update rows with conditions'
      - 'Delete rows with conditions'
      - 'Join tables with leftJoin/innerJoin'
      - 'Use aggregate functions'
      - 'Execute raw SQL when needed'
    failure_modes:
      - mistake: 'Not calling .execute() at the terminal state'
        mechanism: 'Queries are builders — you can compose them conditionally, but .execute() must be called when ready to run the query'
        wrong_pattern: |
          const query = db.selectFrom(users).where(eq(users.id, 'u1')); // Builder, not executed
          const data = query; // Missing .execute()
        correct_pattern: |
          // Building queries conditionally is fine:
          let query = db.selectFrom(users);
          if (filter) query = query.where(eq(users.active, true));
          // But call .execute() at the terminal state:
          const data = await query.execute();
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Not awaiting .execute()'
        mechanism: '.execute() returns a Promise — without await, you get the Promise object, not the data'
        wrong_pattern: |
          const users = db.selectFrom(users).where(eq(users.id, 'u1')).execute(); // Promise, not data
        correct_pattern: |
          const users = await db.selectFrom(users).where(eq(users.id, 'u1')).execute();
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Mixing Kysely/Drizzle/Supabase API patterns'
        mechanism: 'flint-orm has its own API — selectFrom().columns([...]).single() is specific to this library'
        wrong_pattern: |
          // Supabase-style (wrong)
          const users = await db.from('users').select('id, name');
        correct_pattern: |
          // Flint-style
          const users = await db.selectFrom(users).columns(['id', 'name']).execute();
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using WHERE conditions with columns from wrong table'
        mechanism: 'The builder validates column ownership — columns in WHERE must belong to the queried table(s)'
        wrong_pattern: |
          // Using posts column in users query
          await db.selectFrom(users).where(eq(posts.userId, 'u1')).execute(); // ERROR
        correct_pattern: |
          await db.selectFrom(users).where(eq(users.id, 'u1')).execute();
        source: 'src/query/builder.ts'
        priority: 'HIGH'
        status: 'active'

    reference_candidates:
      - topic: 'condition operators'
        reason: '>10 distinct operators (eq, neq, gt, gte, lt, lte, and, or, isIn, isNotIn, isNull, isNotNull, like, glob, between)'

  - name: 'run-migrations'
    slug: 'run-migrations'
    domain: 'migrations'
    description: 'Generate and apply schema migrations safely using the CLI or programmatic API'
    type: 'core'
    covers:
      - 'flint generate'
      - 'flint migrate'
      - 'flint.config.ts schema and migrations paths'
      - 'generate() programmatic API'
      - 'migrate() programmatic API'
      - 'getMigrationStatus()'
      - 'serializeSchema() and diffSchemas()'
    tasks:
      - 'Configure flint.config.ts with schema and migrations paths'
      - 'Generate initial schema migration'
      - 'Apply pending migrations'
      - 'Check migration status'
      - 'Preview migrations with --preview and --dry-run'
      - 'Name migrations with --name'
    failure_modes:
      - mistake: 'Running migrate without generate first'
        mechanism: 'migrate applies existing migration files — you must generate them first from schema changes'
        wrong_pattern: |
          // Modifying schema, then:
          flint migrate // No migration files exist yet!
        correct_pattern: |
          // After schema changes:
          flint generate --name add_users_table
          flint migrate
        source: 'README.md'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Not using --preview or --dry-run before applying'
        mechanism: 'Migrations are irreversible — always preview first to verify the SQL'
        wrong_pattern: |
          flint generate
          flint migrate // Applies without preview
        correct_pattern: |
          flint generate --preview // Review the SQL
          flint migrate --dry-run // Verify what would run
          flint migrate // Apply with confidence
        source: 'README.md'
        priority: 'HIGH'
        status: 'active'

    compositions:
      - library: 'flint-orm/config'
        skill: 'setup-client'

  - name: 'update-schema'
    slug: 'update-schema'
    domain: 'migrations'
    description: 'Add columns and tables without data loss — additive migration patterns'
    type: 'core'
    covers:
      - 'Safe vs unsafe migrations'
      - 'rebuildTable operation'
      - 'Adding columns with defaults'
      - 'Adding new tables'
      - 'Renaming tables and columns'
    tasks:
      - 'Add a new column to an existing table'
      - 'Add a new table with foreign keys'
      - 'Rename a table or column'
      - 'Understand which changes trigger a table rebuild'
    failure_modes:
      - mistake: 'Adding NOT NULL column without a default'
        mechanism: 'SQLite cannot add NOT NULL columns to existing tables without a default — this triggers a table rebuild'
        wrong_pattern: |
          // After generating migration, adding:
          status: text('status').notNull(), // No default — triggers rebuild
        correct_pattern: |
          status: text('status').notNull().default('active'), // Safe: has default
        source: 'src/migration/diff.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Changing a column type (e.g., text to integer)'
        mechanism: 'SQLite has no ALTER COLUMN TYPE — this always triggers a table rebuild'
        wrong_pattern: |
          // Changing after initial migration:
          age: integer('age'), // Was: age: text('age')
        correct_pattern: |
          // Plan for type from the start, or accept the rebuild
          age: integer('age').notNull().default(0),
        source: 'src/migration/diff.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Dropping a column that other tables reference via foreign key'
        mechanism: 'The migration runner checks for incoming foreign keys before rebuild — it will refuse if other tables reference the table being rebuilt'
        wrong_pattern: |
          // Dropping users.id when orders.userId references it
          // Migration fails with: Cannot rebuild "users" — referenced by: orders
        correct_pattern: |
          // Migrate dependent tables first, then rebuild the parent
          flint migrate // Apply orders migration first
          flint generate // Then rebuild users
        source: 'src/migration/migrate.ts'
        priority: 'HIGH'
        status: 'active'

  - name: 'batch-transactions'
    slug: 'batch-transactions'
    domain: 'queries'
    description: 'Run multiple queries atomically in a single transaction'
    type: 'core'
    covers:
      - 'db.batch()'
      - 'Executable interface'
      - 'Transaction safety'
    tasks:
      - 'Run multiple inserts atomically'
      - 'Combine reads and writes in a transaction'
      - 'Ensure all-or-nothing execution'
    failure_modes:
      - mistake: 'Not awaiting the batch call'
        mechanism: 'batch() returns a Promise — without await, the transaction may not complete'
        wrong_pattern: |
          db.batch([
            db.insert(users).values({ id: 'u1', name: 'Alice' }),
            db.insert(posts).values({ id: 'p1', userId: 'u1', title: 'Hello' }),
          ]); // Not awaited!
        correct_pattern: |
          await db.batch([
            db.insert(users).values({ id: 'u1', name: 'Alice' }),
            db.insert(posts).values({ id: 'p1', userId: 'u1', title: 'Hello' }),
          ]);
        source: 'src/flint.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Passing non-Executable objects to batch()'
        mechanism: 'batch() only accepts objects with a .toSQL() method (builders, not raw data)'
        wrong_pattern: |
          db.batch([{ sql: 'INSERT ...', params: [] }]); // Not an Executable
        correct_pattern: |
          db.batch([
            db.insert(users).values({ id: 'u1', name: 'Alice' }),
          ]);
        source: 'src/flint.ts'
        priority: 'MEDIUM'
        status: 'active'

tensions:
  - name: 'type-safety vs flexibility'
    skills: ['define-schema', 'write-queries']
    description: 'Strong typing prevents errors but requires more upfront schema design'
    implication: 'Agents may try to use loose types or `any` to work around strict checks, missing the safety the ORM provides'

  - name: 'immutability vs readability'
    skills: ['write-queries']
    description: 'Immutable builders enable safe composition but create new instances on each call'
    implication: 'Agents may try to mutate a builder instance instead of reassigning the result'

cross_references:
  - from: 'setup-client'
    to: 'driver-selection'
    reason: 'Choosing the right driver is part of client setup — driver-selection provides the detailed comparison'

  - from: 'define-schema'
    to: 'write-queries'
    description: 'Schema definitions determine what queries are type-safe — knowing the schema helps write correct queries'

  - from: 'run-migrations'
    to: 'update-schema'
    description: 'update-schema provides the patterns for safe schema changes that run-migrations executes'

  - from: 'write-queries'
    to: 'batch-transactions'
    description: 'batch() composes multiple query builders — understanding queries first makes batch usage clear'

